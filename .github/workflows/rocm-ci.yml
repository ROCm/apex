name: Apex ROCm CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master]
  schedule:
    - cron: '0 0 * * 0' # weekly
  workflow_dispatch:

env:
  DOCKER_IMAGE: "rocm/pytorch:rocm7.2_ubuntu24.04_py3.12_pytorch_release_2.9.1"

jobs:
  build:
    name: Build Apex Wheel
    runs-on: build-only-apex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Apex Wheel in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ${{ env.DOCKER_IMAGE }} bash -c "
            pip install --upgrade pip
            pip install build ninja wheel packaging

            # Build apex wheel
            python3 -m build --wheel --no-isolation -C--build-option=--cpp_ext -C--build-option=--cuda_ext

            # Fix permissions for GitHub Actions artifact upload
            chown -R $(id -u):$(id -g) dist/
          "

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-wheel
          path: dist/*.whl
          retention-days: 7

  test:
    name: Run Unit Tests
    timeout-minutes: 720
    runs-on: linux-apex-mi325-8
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Wheel Artifact
        uses: actions/download-artifact@v4
        with:
          name: apex-wheel
          path: dist/

      - name: Run Tests in Docker
        run: |
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri --group-add=video --ipc=host \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ${{ env.DOCKER_IMAGE }} bash -c "
            
            # Enforce strict error handling for pipes so failures aren't masked
            set -o pipefail
            EXIT_CODE=0

            # Install dependencies and the built wheel
            pip install expecttest  # Fixes ModuleNotFoundError
            pip install dist/apex-*.whl

            # Run L0 tests
            echo 'Running L0 tests...'
            cd tests/L0
            sh run_rocm.sh 2>&1 | tee ../../log_L0_results.txt || EXIT_CODE=\$?
            cd ../../

            # Run contrib tests
            echo 'Running Contrib tests...'
            cd apex/contrib/test
            python3 run_rocm_extensions.py 2>&1 | tee ../../../log_contrib_results.txt || EXIT_CODE=\$?
            cd ../../..

            echo 'Running Peer Halo Exchange tests...'
            torchrun --nproc_per_node 8 apex/contrib/peer_memory/peer_halo_exchange_module_tests.py 2>&1 | tee log_halo_results.txt || EXIT_CODE=\$?

            # Run Distributed tests
            echo 'Running Distributed Synced BatchNorm tests...'
            cd tests/distributed/synced_batchnorm
            sh unit_test.sh 2>&1 | tee ../../../log_syncbn_results.txt || EXIT_CODE=\$?
            cd ../../..

            # Fix permissions so GitHub Actions can upload the logs
            chown -R $(id -u):$(id -g) *.txt
            
            # Exit with the captured status code so the CI accurately reports failure
            exit \$EXIT_CODE
          "

      - name: Upload Test Logs
        if: always() # Uploads logs even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            log_L0_results.txt
            log_contrib_results.txt
            log_halo_results.txt
            log_syncbn_results.txt
          retention-days: 14
