name: ROCm CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: rocm-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTORCH_ROCM_ARCH: "gfx942"

jobs:
  build:
    name: Build (PyTorch main + apex wheel)
    runs-on: build-only-apex
    timeout-minutes: 720

    steps:
      - name: Checkout apex
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve latest PyTorch main SHA
        id: pytorch
        shell: bash
        run: |
          SHA="$(git ls-remote https://github.com/pytorch/pytorch.git refs/heads/main | awk '{print $1}')"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "PyTorch main SHA: ${SHA}"

      - name: Restore cached PyTorch wheel
        id: cache-torch
        uses: actions/cache@v4
        with:
          path: .ci/torch-wheel
          key: torch-rocm72-py312-${{ steps.pytorch.outputs.sha }}

      - name: Build PyTorch
        if: steps.cache-torch.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail

          # Create build script for the container
          cat << 'EOF' > build_torch.sh
          #!/bin/bash
          set -euxo pipefail
          : "${PYTORCH_SHA:?PYTORCH_SHA env var not set}"

          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y \
            ca-certificates \
            curl \
            git \
            pkg-config \
            python3-dev \
            python3-venv \
            python-is-python3 \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libopenblas-dev \
            zlib1g-dev \
            libffi-dev
          
          git config --global --add safe.directory '*'

          rm -rf /workspace/pytorch-src
          git clone --recursive https://github.com/pytorch/pytorch.git /workspace/pytorch-src
          cd /workspace/pytorch-src
          git checkout "${PYTORCH_SHA}"
          git submodule sync --recursive
          git submodule update --init --recursive

          # Fail early with a clear error if the checkout is missing ROCm/HIP bits
          test -f c10/hip/impl/hip_cmake_macros.h.in
          test -f aten/src/ATen/hip/HIPConfig.h.in
          test -d aten/src/THH
          git rev-parse HEAD
          git show -s --oneline
          
          python3 -m venv /venv
          export PATH="/venv/bin:$PATH"
          pip install -U pip setuptools wheel

          # PyTorch's requirements.txt may pull in the Python "cmake" package which
          # ships CMake 4.x into /venv/bin. CMake 4 breaks third_party projects
          # that still set cmake_minimum_required(VERSION < 3.5) (e.g. NNPACK).
          # We must use system CMake from apt (Ubuntu 24.04: 3.28.x).
          python - << 'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text().splitlines()
          out = []
          for line in src:
            s = line.strip()
            if not s or s.startswith("#"):
              out.append(line)
              continue
            name = s.split()[0]
            base = name.split("==")[0].split(">=")[0].split("<=")[0]
            base = base.split("~=")[0].split("!=")[0]
            if base in {"cmake", "ninja"}:
              continue
            out.append(line)
          Path("requirements.no-cmake-ninja.txt").write_text(
            "\n".join(out) + "\n"
          )
          PY
          pip install -r requirements.no-cmake-ninja.txt

          # Defensive: if anything still pulled them in, remove venv-provided binaries.
          pip uninstall -y cmake ninja || true
          rm -f /venv/bin/cmake /venv/bin/ninja || true
          hash -r

          cmake --version
          ninja --version
          
          export ROCM_HOME=/opt/rocm
          export PYTORCH_ROCM_ARCH=gfx942
          export CMAKE_PREFIX_PATH="/venv:/opt/rocm"
          export USE_ROCM=1
          export USE_CUDA=0
          export BUILD_TEST=0
          export MAX_JOBS=16

          export USE_NNPACK=0
          export USE_XNNPACK=0
          export USE_PYTORCH_QNNPACK=0
          
          python setup.py bdist_wheel
          
          mkdir -p /workspace/dist
          cp dist/*.whl /workspace/dist/
          EOF
          chmod +x build_torch.sh
          
          # Run container in background, inject files, build, extract wheels
          docker rm -f rocm-builder || true
          docker run -d --name rocm-builder rocm/dev-ubuntu-24.04:7.2-complete sleep infinity
          
          docker exec rocm-builder mkdir -p /workspace
          docker cp build_torch.sh rocm-builder:/workspace/build_torch.sh
          
          docker exec -e PYTORCH_SHA='${{ steps.pytorch.outputs.sha }}' \
            rocm-builder /workspace/build_torch.sh
          
          mkdir -p .ci/torch-wheel
          docker cp rocm-builder:/workspace/dist/. .ci/torch-wheel/
          docker rm -f rocm-builder

      - name: Build Apex
        shell: bash
        run: |
          set -euxo pipefail
          
          cat << 'EOF' > build_apex.sh
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y \
            ca-certificates \
            git \
            python3-venv \
            python3-dev \
            python-is-python3 \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev
          
          git config --global --add safe.directory '*'

          python3 -m venv /venv
          export PATH="/venv/bin:$PATH"
          pip install -U pip setuptools wheel build
          
          cd /workspace
          pip install .ci/torch-wheel/*.whl
          pip install -r requirements.txt
          
          export ROCM_HOME=/opt/rocm
          export PYTORCH_ROCM_ARCH=gfx942
          export APEX_BUILD_CPP_OPS=1
          export APEX_BUILD_CUDA_OPS=1
          
          make clean || true
          python -m build --wheel --no-isolation .
          EOF
          chmod +x build_apex.sh

          docker rm -f rocm-builder || true
          docker run -d --name rocm-builder rocm/dev-ubuntu-24.04:7.2-complete sleep infinity
          
          docker exec rocm-builder mkdir -p /workspace
          docker cp . rocm-builder:/workspace/
          
          docker exec rocm-builder /workspace/build_apex.sh
          
          mkdir -p dist
          docker cp rocm-builder:/workspace/dist/. dist/
          docker rm -f rocm-builder

      - name: Upload wheels (torch + apex)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py312-rocm72
          if-no-files-found: error
          path: |
            .ci/torch-wheel/*.whl
            dist/*.whl

  test:
    name: Test
    runs-on: linux-apex-mi325-8
    needs: build
    timeout-minutes: 360

    steps:
      - name: Checkout apex
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-py312-rocm72
          path: .ci/wheels

      - name: Run Tests
        shell: bash
        run: |
          set -euxo pipefail
          
          cat << 'EOF' > run_tests_docker.sh
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y \
            ca-certificates \
            git \
            python3-venv \
            python3-dev \
            python-is-python3 \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev
          
          python3 -m venv /venv
          export PATH="/venv/bin:$PATH"
          pip install -U pip setuptools wheel
          
          cd /workspace
          pip install .ci/wheels/torch*.whl
          pip install -r requirements.txt
          pip install .ci/wheels/apex*.whl
          
          python -c "import torch; print('torch:', torch.__version__, 'hip:', torch.version.hip)"
          python -c "import apex; print('apex import OK')"
          
          export ROCM_HOME=/opt/rocm
          export PYTORCH_ROCM_ARCH=gfx942
          export TORCH_EXTENSIONS_DIR=/workspace/.torch_extensions
          export NPROC_PER_NODE=8
          export MASTER_ADDR=127.0.0.1
          export MASTER_PORT="$((10000 + RANDOM % 20000))"
          
          mkdir -p test-artifacts
          bash tests/jit_build/run_tests.sh "condition" "11" 2>&1 | tee test-artifacts/ci-console.log
          
          # Manually move script logs so we can copy them out
          cp results_jit_unit_test*.log test-artifacts/ || true
          cp results_jit_unit_test*.csv test-artifacts/ || true
          EOF
          chmod +x run_tests_docker.sh

          docker rm -f rocm-tester || true
          docker run -d --name rocm-tester --device=/dev/kfd --device=/dev/dri --group-add video rocm/dev-ubuntu-24.04:7.2-complete sleep infinity
          
          docker exec rocm-tester mkdir -p /workspace
          docker cp . rocm-tester:/workspace/
          
          # Run tests and capture exit code
          set +e 
          docker exec rocm-tester /workspace/run_tests_docker.sh
          EXIT_CODE=$?
          set -e
          
          # Extract logs
          mkdir -p test-artifacts
          docker cp rocm-tester:/workspace/test-artifacts/. test-artifacts/
          docker rm -f rocm-tester
          
          # Fail CI if tests failed
          exit $EXIT_CODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py312-rocm
          if-no-files-found: warn
          path: test-artifacts/**
