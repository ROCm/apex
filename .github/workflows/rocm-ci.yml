name: Apex ROCm CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master]
  schedule:
    - cron: '0 0 * * 0' # weekly
  workflow_dispatch:

env:
  DOCKER_IMAGE: "rocm/pytorch:rocm7.2_ubuntu24.04_py3.12_pytorch_release_2.9.1"

jobs:
  build:
    name: Build Apex Wheel
    runs-on: build-only-apex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Apex Wheel in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ${{ env.DOCKER_IMAGE }} bash -c "
            pip install --upgrade pip
            pip install build ninja wheel packaging

            python3 -m build --wheel --no-isolation -C--build-option=--cpp_ext -C--build-option=--cuda_ext

            chown -R $(id -u):$(id -g) dist/
          "

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-wheel
          path: dist/*.whl
          retention-days: 7

  test:
    name: Run Unit Tests
    timeout-minutes: 720
    runs-on: linux-apex-mi325-8
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Wheel Artifact
        uses: actions/download-artifact@v4
        with:
          name: apex-wheel
          path: dist/

      - name: Start Background Docker Container
        run: |
          docker run -d --name apex-test-container \
            --device=/dev/kfd --device=/dev/dri --group-add=video --ipc=host \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ${{ env.DOCKER_IMAGE }} sleep infinity

      - name: Install Dependencies and Built Wheel
        run: |
          docker exec apex-test-container bash -c "
            pip install expecttest
            pip install dist/apex-*.whl
          "

      - name: Run L0 tests
        run: |
          docker exec apex-test-container bash -c "
            cd tests/L0
            sh run_rocm.sh 2>&1 | tee ../../log_L0_results.txt
          "

      - name: Run Contrib tests
        run: |
          docker exec apex-test-container bash -c "
            cd apex/contrib/test
            python3 run_rocm_extensions.py 2>&1 | tee ../../../log_contrib_results.txt
          "

      - name: Run Peer Halo Exchange tests
        run: |
          docker exec apex-test-container bash -c "
            torchrun --nproc_per_node 8 apex/contrib/peer_memory/peer_halo_exchange_module_tests.py 2>&1 | tee log_halo_results.txt
          "

      - name: Run Distributed Synced BatchNorm tests
        run: |
          docker exec apex-test-container bash -c "
            cd tests/distributed/synced_batchnorm
            sh unit_test.sh 2>&1 | tee ../../../log_syncbn_results.txt
          "

      - name: Fix Artifact Permissions
        if: always() # Run even if a test step fails
        run: |
          docker exec apex-test-container bash -c "chown -R $(id -u):$(id -g) *.txt"

      - name: Cleanup Background Container
        if: always()
        run: docker rm -f apex-test-container

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            log_L0_results.txt
            log_contrib_results.txt
            log_halo_results.txt
            log_syncbn_results.txt
          retention-days: 14
