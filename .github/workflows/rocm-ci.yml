name: ROCm CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      pytorch_index_url:
        description: >-
          PyTorch nightly wheel index URL (e.g.
          https://download.pytorch.org/whl/nightly/rocm7.2)
        required: false
        default: "https://download.pytorch.org/whl/nightly/rocm7.2"

concurrency:
  group: rocm-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTORCH_ROCM_ARCH: "gfx942"
  PYTORCH_INDEX_URL: >-
    ${{ github.event.inputs.pytorch_index_url ||
    'https://download.pytorch.org/whl/nightly/rocm7.2' }}

jobs:
  build:
    name: Build apex wheel (ROCm)
    runs-on: build-only-apex
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      
      - name: Sanity check
        run: |
          set -euxo pipefail
          which hipcc || true
          hipcc --version || true
          echo "ROCM_HOME=$ROCM_HOME ROCM_PATH=$ROCM_PATH"
          ls -la /opt | sed -n '1,200

      - name: Ensure ROCm is on PATH
        shell: bash
        run: |
          set -euxo pipefail
          
          CANDIDATES=()

          # Prefer canonical ROCm locations on Linux.
          if [ -x /opt/rocm/bin/hipcc ]; then
            CANDIDATES+=("/opt/rocm")
          fi
          while IFS= read -r d; do
            CANDIDATES+=("$d")
          done < <(ls -d /opt/rocm-* 2>/dev/null | sort -V || true)

          # Ask hipconfig if available.
          if command -v hipconfig >/dev/null 2>&1; then
            CANDIDATES+=("$(hipconfig --rocmpath 2>/dev/null || true)")
          fi

          # Respect provided env vars 
          CANDIDATES+=("${ROCM_PATH:-}" "${ROCM_HOME:-}")

          # Infer from hipcc realpath.
          if command -v hipcc >/dev/null 2>&1; then
            HIPCC_REAL="$(readlink -f "$(command -v hipcc)" || command -v hipcc)"
            CANDIDATES+=("$(cd "$(dirname "$HIPCC_REAL")/.." && pwd)")
          fi

          ROCM_HOME=""
          for d in "${CANDIDATES[@]}"; do
            [ -n "${d:-}" ] || continue
            if [ -x "${d}/bin/hipcc" ] && [ -d "${d}/include" ]; then
              ROCM_HOME="$d"
            fi
            # Prefer a ROCm root that actually contains Thrust headers.
            if [ -x "${d}/bin/hipcc" ] && [ -f "${d}/include/thrust/complex.h" ]; then
              ROCM_HOME="$d"
              break
            fi
          done

          if [ -z "${ROCM_HOME}" ]; then
            echo "ERROR: Could not determine ROCm root (need hipcc)."
            exit 1
          fi

          echo "ROCM_HOME=${ROCM_HOME}" >> "${GITHUB_ENV}"
          echo "ROCM_PATH=${ROCM_HOME}" >> "${GITHUB_ENV}"

          # Add toolchain to PATH for later steps.
          echo "${ROCM_HOME}/bin" >> "${GITHUB_PATH}"
          if [ -d "${ROCM_HOME}/llvm/bin" ]; then
            echo "${ROCM_HOME}/llvm/bin" >> "${GITHUB_PATH}"
          fi
          if [ -d "${ROCM_HOME}/lib/llvm/bin" ]; then
            echo "${ROCM_HOME}/lib/llvm/bin" >> "${GITHUB_PATH}"
          fi

          "${ROCM_HOME}/bin/hipcc" --version
          test -f "${ROCM_HOME}/include/thrust/complex.h"

      - name: Install build deps
        shell: bash
        run: |
          set -euxo pipefail
          if command -v apt-get >/dev/null; then
            SUDO=""
            if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
              SUDO="sudo -n"
            fi
            ${SUDO} apt-get update
            ${SUDO} apt-get install -y \
              build-essential \
              cmake \
              ninja-build \
              python3-dev \
              pkg-config \
              libopenblas-dev \
              libffi-dev \
              libssl-dev
          fi

      - name: Create venv + install PyTorch
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv
          . .venv/bin/activate

          python -m pip install -U pip setuptools wheel build packaging

          # Install torch from the ROCm nightly index, but allow deps from PyPI.
          python -m pip install --pre torch \
            --index-url "${PYTORCH_INDEX_URL}" \
            --extra-index-url https://pypi.org/simple

          python - << 'PY'
          import torch
          print("torch:", torch.__version__)
          print("hip:", torch.version.hip)
          print("git:", getattr(torch.version, "git_version", None))
          PY

      - name: Build apex wheel
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate

          python -m pip install -r requirements.txt

          export ROCM_HOME="${ROCM_HOME}"
          export PYTORCH_ROCM_ARCH="${PYTORCH_ROCM_ARCH}"

          export APEX_BUILD_CPP_OPS=1
          export APEX_BUILD_CUDA_OPS=1

          python -m build --wheel --no-isolation .
          ls -la dist

      - name: Write build metadata
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate

          mkdir -p build-metadata
          python - << 'PY' > build-metadata/pytorch.txt
          import torch
          print("torch:", torch.__version__)
          print("hip:", torch.version.hip)
          print("git:", getattr(torch.version, "git_version", None))
          PY

      - name: Upload wheel + metadata
        uses: actions/upload-artifact@v4
        with:
          name: apex-wheel-py312-rocm-nightly
          if-no-files-found: error
          path: |
            dist/*.whl
            build-metadata/pytorch.txt

  test:
    name: Test
    runs-on: amd-gpu-mi235-8
    needs: build
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Ensure ROCm is on PATH
        shell: bash
        run: |
          set -euxo pipefail
          if [ -z "${ROCM_HOME:-}" ]; then
            if [ -n "${ROCM_PATH:-}" ] && [ -x "${ROCM_PATH}/bin/hipcc" ]; then
              ROCM_HOME="${ROCM_PATH}"
            elif command -v hipcc >/dev/null 2>&1; then
              HIPCC="$(command -v hipcc)"
              ROCM_HOME="$(cd "$(dirname "$HIPCC")/.." && pwd)"
            elif [ -x /opt/rocm/bin/hipcc ]; then
              ROCM_HOME="/opt/rocm"
            elif [ -x /usr/local/rocm/bin/hipcc ]; then
              ROCM_HOME="/usr/local/rocm"
            else
              echo "ERROR: Could not find ROCm (hipcc). Set ROCM_HOME or install ROCm."
              exit 1
            fi
          fi

          echo "ROCM_HOME=${ROCM_HOME}" >> "${GITHUB_ENV}"
          echo "${ROCM_HOME}/bin" >> "${GITHUB_PATH}"
          echo "${ROCM_HOME}/llvm/bin" >> "${GITHUB_PATH}"
          hipcc --version

      - name: Download apex wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: apex-wheel-py312-rocm-nightly
          path: .ci/artifacts

      - name: Create venv + install torch + apex wheel
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv
          . .venv/bin/activate

          python -m pip install -U pip setuptools wheel

          python -m pip install --pre torch \
            --index-url "${PYTORCH_INDEX_URL}" \
            --extra-index-url https://pypi.org/simple

          python -m pip install -r requirements.txt
          python -m pip install .ci/artifacts/dist/*.whl

          python - << 'PY'
          import torch, apex
          print("torch:", torch.__version__, "hip:", torch.version.hip)
          print("apex:", getattr(apex, "__version__", "unknown"), "import OK")
          PY

      - name: Run ROCm tests
        shell: bash
        run: |
          set -euxo pipefail
          . .venv/bin/activate

          export ROCM_HOME="${ROCM_HOME}"
          export PYTORCH_ROCM_ARCH="${PYTORCH_ROCM_ARCH}"
          export TORCH_EXTENSIONS_DIR="${PWD}/.torch_extensions"
          export MASTER_ADDR=127.0.0.1
          export MASTER_PORT="$((10000 + RANDOM % 20000))"

          mkdir -p test-artifacts

          # Run the test script directly after installing the wheel.
          set +e
          bash tests/jit_build/run_tests.sh condition 11 2>&1 | tee test-artifacts/ci-console.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          cp -f results_jit_unit_test*.log test-artifacts/ || true
          cp -f results_jit_unit_test*.csv test-artifacts/ || true

          exit "${EXIT_CODE}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py312-rocm-nightly
          if-no-files-found: warn
          path: test-artifacts/**