name: Apex ROCm CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master]
  schedule:
    - cron: '0 0 * * 0' # weekly
  workflow_dispatch:

env:
  DOCKER_IMAGE: "rocm/pytorch:rocm7.2_ubuntu24.04_py3.12_pytorch_release_2.9.1"

jobs:
  build:
    name: Build Apex Wheel
    runs-on: build-only-apex
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Apex Wheel in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ${{ env.DOCKER_IMAGE }} bash -c "
            
            pip install --upgrade pip
            pip install build ninja wheel packaging

            # Build apex wheel
            python3 -m build --wheel --no-isolation -C--build-option=--cpp_ext -C--build-option=--cuda_ext

            # Fix permissions so GitHub Actions can upload the artifact
            chown -R $(id -u):$(id -g) dist/
          "

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-wheel
          path: dist/*.whl
          retention-days: 7

  test:
    name: Run Unit Tests and Benchmarks
    runs-on: linux-apex-mi325-8
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Wheel Artifact
        uses: actions/download-artifact@v4
        with:
          name: apex-wheel
          path: dist/

      - name: Run Tests in Docker
        run: |
          docker run --rm \
            --device=/dev/kfd --device=/dev/dri --group-add=video \
            -v ${{ github.workspace }}:/workspace -w /workspace \
            ${{ env.DOCKER_IMAGE }} bash -c "
            
            # Install the built wheel
            pip install dist/apex-*.whl

            # Run LO unit tests
            echo 'Running LO unit tests...'
            cd tests/L0
            sh run_rocm.sh 2>&1 | tee ../../log_L0_results.txt
            cd ../../

            # Run extensions import tests
            echo 'Running Extension Import tests...'
            python3 tests/test_extension_import.py 2>&1 | tee log_import_results.txt

            # Run micro-benchmarking
            echo 'Running Micro-benchmarking...'
            python3 micro_benchmarking_pytorch.py --network resnet50 2>&1 | tee log_microbenchmark_results.txt

            # Extract failed tests from log file
            grep -i 'fail\|error' log_L0_results.txt log_import_results.txt > extracted_failed_tests.txt || true

            # Fix permissions for artifacts
            chown -R $(id -u):$(id -g) *.txt
          "

      - name: Upload Test Logs and Extracted Failures
        if: always() # Ensure logs upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            log_L0_results.txt
            log_import_results.txt
            log_microbenchmark_results.txt
            extracted_failed_tests.txt
          retention-days: 14
